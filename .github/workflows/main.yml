# Cargar datos (con cache)
try:
    df_partidos, df_picks = cargar_datos_frescos()
except Exception as e:
    st.error(f"Error al cargar datos: {e}")
    st.info("Asegúrate de que tu API key es correcta y tienes conexión a internet. Luego refresca.")
    st.stop()

# Unir información de partidos con picks
# Como las columnas tienen que coincidir, usamos 'partido'
df_merged = pd.merge(df_partidos, df_picks, on="partido", how="inner")

# Obtener deportes únicos
deportes = df_merged['deporte'].unique()
deportes_orden = ['Soccer', 'Basketball', 'Icehockey', 'Baseball']
deportes_disponibles = [d for d in deportes_orden if d in deportes]

if not deportes_disponibles:
    st.warning("No hay partidos para mostrar. Ejecuta primero `python src/data_fetcher.py` y luego `python src/predictions.py` manualmente.")
    st.stop()

# Crear tabs
tabs = st.tabs([f"{get_icono(d)} {d}" for d in deportes_disponibles])

for idx, deporte in enumerate(deportes_disponibles):
    with tabs[idx]:
        df_deporte = df_merged[df_merged['deporte'] == deporte]
        if df_deporte.empty:
            st.markdown('<div class="empty-state">🎯 No hay partidos de este deporte hoy.</div>', unsafe_allow_html=True)
            continue
        
        # Generar tarjetas horizontales
        st.markdown('<div class="scroll-container"><div class="games-horizontal">', unsafe_allow_html=True)
        for _, row_partido in df_deporte.iterrows():
            # Buscar el pick correspondiente (debería coincidir el partido)
            row_pick = df_picks[df_picks['partido'] == row_partido['partido']].iloc[0]
            html_card = mostrar_tarjeta(row_partido, row_pick)
            st.markdown(html_card, unsafe_allow_html=True)
        st.markdown('</div></div>', unsafe_allow_html=True)

st.caption("🚀 Datos obtenidos de The Odds API · Sistema ThIA · Picks generados con EV+")
