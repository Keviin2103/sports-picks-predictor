# ---------- FUNCIONES AUXILIARES ----------
@st.cache_data(ttl=3600)  # cache por 1 hora
def cargar_datos_frescos():
    """Ejecuta los scrapers y genera picks, retorna df_partidos y df_picks"""
    # 1. Descargar partidos (si no existen o son viejos)
    if not os.path.exists("data/partidos_hoy.csv"):
        obtener_partidos_del_dia()
    else:
        # Opcional: si quieres forzar actualización cada vez, descomenta:
        # obtener_partidos_del_dia()
        pass
    
    # 2. Generar picks a partir del CSV
    df_picks = crear_picks_del_dia()  # esto guarda y retorna el DataFrame
    
    # 3. Cargar partidos originales para obtener cuotas
    df_partidos = pd.read_csv("data/partidos_hoy.csv")
    return df_partidos, df_picks

def get_icono(deporte):
    iconos = {
        "Soccer": "⚽", "Football": "⚽",
        "Baseball": "⚾", "Basketball": "🏀",
        "Icehockey": "🏒", "Hockey": "🏒"
    }
    for key, val in iconos.items():
        if key.lower() in deporte.lower():
            return val
    return "🏆"

def mostrar_tarjeta(row_partido, row_pick):
    """Dibuja una tarjeta individual con todos los datos"""
    # Extraer información
    home, away = row_partido['partido'].split(' vs ')
    liga = row_partido['liga']
    hora = row_partido['hora']
    deporte = row_partido['deporte']
    icono = get_icono(deporte)
    
    # Cuotas
    home_odds = row_partido['home_odds']
    away_odds = row_partido['away_odds']
    
    # Picks
    pick_principal = row_pick['Pick Principal']
    pick_secundario = row_pick['Pick Secundario']
    
    # Calcular EV simulado (ficticio, mejorable con modelo real)
    # Tomamos la cuota del pick principal y asumimos probabilidad real 50%
    try:
        if pick_principal.split(' gana')[0] in home:
            cuota_principal = home_odds
        else:
            cuota_principal = away_odds
        ev_simulado = round((cuota_principal * 0.5 - 1) * 100, 1)
    except:
        ev_simulado = 5.0
    
    confianza = min(95, max(50, int(ev_simulado * 1.5))) if ev_simulado > 0 else 65
    
    # Generar una prop ficticia (más adelante la puedes sacar de otro modelo)
    prop_player = "Jugador destacado"
    prop_line = "Over 1.5 puntos / goles"
    prop_odds = round(1.9, 2)
    prop_ev = round((prop_odds * 0.5 - 1) * 100, 1)
    
    html_card = f"""
    <div class="game-card">
        <div class="card-header">
            <span class="league">{liga.upper()}</span>
            <span>🕒 {hora[:16]}</span>
        </div>
        <div class="matchup">
            <div class="team">
                <div class="team-logo">{icono}</div>
                <div class="team-name">{away}</div>
                <div class="team-abbr">{away[:3].upper()}</div>
            </div>
            <div class="vs-circle">VS</div>
            <div class="team">
                <div class="team-logo">{icono}</div>
                <div class="team-name">{home}</div>
                <div class="team-abbr">{home[:3].upper()}</div>
            </div>
        </div>
        <div class="pick-card">
            <div class="pick-val">🎯 PRINCIPAL: {pick_principal}</div>
            <div class="pick-odds">Cuota: {cuota_principal:.2f} | EV {ev_simulado}%</div>
            <div style="margin-top:8px; border-top:0.5px solid #1A3050; padding-top:6px">
                <div class="pick-val" style="font-size:13px">📊 SECUNDARIA: {pick_secundario}</div>
            </div>
            <div class="prop-item">
                <div class="prop-player">⭐ PROP: {prop_player}</div>
                <div class="prop-line">{prop_line} ({prop_odds}) | EV {prop_ev}%</div>
            </div>
            <div class="ev-badge">Confianza ThIA: {confianza}%</div>
            <div><span class="rule-pill">R158</span><span class="rule-pill">EV+</span></div>
            <div style="font-size:10px; color:#8FA8B8; margin-top:8px">📌 Basado en cuotas y tendencias recientes</div>
        </div>
    </div>
    """
    return html_card

